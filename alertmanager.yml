global:
  resolve_timeout: 5m

route:
  receiver: pulsewatch-webhook
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: pulsewatch-webhook
    webhook_configs:
      # Alertmanager и app в одной docker-сети — стучимся по имени сервиса.
      - url: http://app:8000/alertmanager/webhook
        send_resolved: true
