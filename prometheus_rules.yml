groups:
  - name: pulsewatch.backend
    interval: 30s
    rules:
      - alert: BackendDown
        expr: up{job="pulsewatch"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PulseWatch backend не отвечает"
          description: "Prometheus не может скрэйпать /metrics/prometheus уже более 1 минуты."

      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, sum by (le) (rate(http_request_duration_seconds_bucket[5m]))) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Высокая латентность HTTP-запросов"
          description: "P95 латентность > 500ms на протяжении 5 минут."

      - alert: HighErrorRate
        expr: sum(rate(http_requests_total{status=~"5.."}[5m])) > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Бэкенд возвращает много 5xx"
          description: "Доля 5xx > 1% запросов в секунду на протяжении 5 минут."
