<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseWatch — Сброс пароля</title>
    <link rel="stylesheet" href="/static/style.css">
    <script>
        (function () {
            try {
                var saved = localStorage.getItem("pulsewatch.theme");
                if (saved === "light" || saved === "dark") {
                    document.documentElement.dataset.theme = saved;
                }
            } catch (e) { /* ignore */ }
        })();
    </script>
</head>
<body>
    <header>
        <h1>PulseWatch</h1>
    </header>
    <main>
        <section class="centered-card">
            <h2 id="title">Сброс пароля</h2>
            <p id="no-token-msg" hidden class="error">
                В ссылке нет токена. Открой ссылку из email-сообщения.
            </p>
            <form id="reset-form">
                <label>
                    <span id="label-new">Новый пароль (минимум 6 символов)</span>
                    <input type="password" id="new-password" minlength="6" required autocomplete="new-password">
                </label>
                <label>
                    <span id="label-confirm">Подтверди пароль</span>
                    <input type="password" id="confirm-password" minlength="6" required autocomplete="new-password">
                </label>
                <button type="submit" id="submit-btn">Сменить пароль</button>
                <p id="error" class="error" hidden></p>
                <p id="success" class="success-msg" hidden>
                    Пароль обновлён. <a href="/">Войти</a>
                </p>
            </form>
        </section>
    </main>
    <script src="/static/reset-password.js"></script>
</body>
</html>
