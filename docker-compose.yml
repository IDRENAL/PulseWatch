# Общий блок переменных окружения для app/worker/beat (DRY через YAML-анкор)
x-app-env: &app-env
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_HOST: db
  DB_PORT: 5432
  DB_NAME: ${DB_NAME}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  SECRET_KEY: ${SECRET_KEY}
  ALGORITHM: ${ALGORITHM}
  ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}

services:
  db:
    image: postgres:16-alpine
    container_name: pulsewatch_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pulsewatch_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: pulsewatch_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: *app-env
    ports:
      - "8000:8000"

  worker:
    build: .
    container_name: pulsewatch_worker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: *app-env
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "-l", "info"]

  beat:
    build: .
    container_name: pulsewatch_beat
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: *app-env
    command: ["celery", "-A", "app.tasks.celery_app", "beat", "-l", "info"]

volumes:
  postgres_data:
  redis_data:
